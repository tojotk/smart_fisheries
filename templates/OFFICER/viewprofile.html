{% extends 'OFFICER/officer_home.html' %}
{% block body %}
<style>
    :root {
        --obsidian: #0f0810;
        --plum-box: rgba(45, 30, 47, 0.4);
        --accent-violet: #b565d8;
        --accent-pink: #ff6ec7;
        --text-lavender: #e6d5f5;
        --pure-white: #ffffff;
    }

    .profile-wrapper {
        max-width: 800px;
        margin: 3rem auto;
        padding: 0 20px;
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Header Section */
    .profile-header {
        text-align: center;
        margin-bottom: 4rem;
    }

    .profile-header h2 {
        color: var(--pure-white);
        font-weight: 800;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-size: 2.2rem;
    }

    .profile-header span {
        color: var(--accent-pink);
    }

    /* Avatar Glow Circle */
    .avatar-glow-container {
        width: 150px;
        height: 150px;
        margin: 0 auto 2rem;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .avatar-glow-container::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid var(--accent-violet);
        box-shadow: 0 0 30px var(--accent-violet), inset 0 0 20px var(--accent-violet);
        animation: pulse 3s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.1); opacity: 0.3; }
        100% { transform: scale(1); opacity: 0.6; }
    }

    .avatar-glow-container i {
        font-size: 4rem;
        color: var(--pure-white);
        z-index: 2;
    }

    /* Info Grid (Replacing Tables) */
    .info-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
    }

    .info-row {
        background: var(--plum-box);
        backdrop-filter: blur(10px);
        padding: 20px 30px;
        border-radius: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 3px solid transparent;
        transition: 0.3s;
    }

    .info-row:hover {
        border-left: 3px solid var(--accent-pink);
        background: rgba(181, 101, 216, 0.1);
        transform: translateX(10px);
    }

    .label-group {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .label-group i {
        color: var(--accent-violet);
        font-size: 1.2rem;
        width: 25px;
    }

    .label-text {
        color: var(--text-lavender);
        text-transform: uppercase;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .value-text {
        color: var(--pure-white);
        font-weight: 600;
        font-size: 1.1rem;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    /* Mobile View */
    @media (max-width: 600px) {
        .info-row {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
        .value-text {
            padding-left: 40px;
        }
    }
</style>

<div class="profile-wrapper">
    <div class="profile-header">
        <h2>Officer <span>Profile</span></h2>
    </div>

    <div class="avatar-glow-container">
        <i class="fas fa-user-shield"></i>
    </div>

    <div class="info-grid">
        <div class="info-row">
            <div class="label-group">
                <i class="fas fa-id-card"></i>
                <span class="label-text">Full Name</span>
            </div>
            <div class="value-text">{{ data.name }}</div>
        </div>

        <div class="info-row">
            <div class="label-group">
                <i class="fas fa-phone-alt"></i>
                <span class="label-text">Contact Link</span>
            </div>
            <div class="value-text">{{ data.phone }}</div>
        </div>

        <div class="info-row">
            <div class="label-group">
                <i class="fas fa-building"></i>
                <span class="label-text">Department</span>
            </div>
            <div class="value-text">{{ data.department }}</div>
        </div>

        <div class="info-row">
            <div class="label-group">
                <i class="fas fa-medal"></i>
                <span class="label-text">Designation</span>
            </div>
            <div class="value-text">{{ data.designation }}</div>
        </div>
    </div>
</div>
{% endblock %}
