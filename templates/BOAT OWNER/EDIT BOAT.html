{% extends 'BOAT OWNER/owner_home.html' %}
{% block body %}

<style>
    /* Formal Deep Teal Silk Form Styling */
    .edit-layout {
        max-width: 900px;
        margin: auto;
        padding-top: 3rem;
    }

    .form-header {
        margin-bottom: 2rem;
        border-left: 4px solid #2dd4bf;
        padding-left: 1.5rem;
    }

    .form-title {
        font-family: 'Raleway', sans-serif;
        color: #ffffff;
        font-size: 1.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0;
    }

    .form-subtitle {
        color: #2dd4bf;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 5px;
    }

    /* Formal Command Card */
    .command-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(45, 212, 191, 0.3);
        border-radius: 8px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* Grid Layout */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .full-width {
        grid-column: span 2;
    }

    /* Label & Input Styling */
    .field-group label {
        color: #2dd4bf;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
        display: block;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(45, 212, 191, 0.5);
        font-size: 1rem;
    }

    .form-control {
        background: rgba(11, 48, 55, 0.5);
        border: 1px solid rgba(45, 212, 191, 0.3);
        border-radius: 4px;
        padding: 12px 15px 12px 45px;
        color: white;
        font-size: 1rem;
        width: 100%;
        transition: 0.3s;
    }

    .form-control:focus {
        outline: none;
        border-color: #2dd4bf;
        background: rgba(11, 48, 55, 0.8);
        box-shadow: 0 0 10px rgba(45, 212, 191, 0.2);
    }

    /* Button Styling */
    .btn-update {
        background: transparent;
        border: 1px solid #2dd4bf;
        color: #2dd4bf;
        padding: 15px;
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 20px;
        width: 100%;
        border-radius: 4px;
    }

    .btn-update:hover {
        background: #2dd4bf;
        color: #0b3037;
        box-shadow: 0 10px 20px rgba(45, 212, 191, 0.2);
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }
        .full-width {
            grid-column: span 1;
        }
        .command-card {
            padding: 25px;
        }
    }
</style>

<div class="container edit-layout">
    <div class="form-header">
        <h2 class="form-title">Registry Modification</h2>
        <p class="form-subtitle">Update Official Vessel Specifications</p>
    </div>

    <div class="command-card">
        <form method="post" action="/myapp/boat_owner_edit_boat_post">
            {% csrf_token %}
            <input type="hidden" name="id" value="{{ data.id }}">

            <div class="form-grid">
                <div class="field-group">
                    <label for="reg_no">Registry Number</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" class="form-control" id="reg_no" name="reg_no" value="{{ data.regno }}" required>
                    </div>
                </div>

                <div class="field-group">
                    <label for="capacity">Operational Capacity</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-users-gear"></i>
                        <input type="text" class="form-control" id="capacity" name="capacity" value="{{ data.capacity }}" required>
                    </div>
                </div>

                <div class="field-group full-width">
                    <label for="type">Vessel Classification</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-anchor"></i>
                        <input type="text" class="form-control" id="type" name="type" value="{{ data.type }}" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-update">
                <i class="fa-solid fa-floppy-disk me-2"></i> Commit Updates
            </button>
        </form>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

{% endblock %}
