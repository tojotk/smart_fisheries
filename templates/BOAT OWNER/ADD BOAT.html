{% extends 'BOAT OWNER/owner_home.html' %}
{% block body %}

<style>
  /* Formal Deep Teal Silk Form Styling */
  .form-container {
    padding: 3rem 1rem;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .boat-form-card {
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(15px);
    border-radius: 8px;
    border: 1px solid rgba(45, 212, 191, 0.3);
    max-width: 550px;
    width: 100%;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }

  /* Formal Top Bar Accent */
  .boat-form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #2dd4bf; /* Emerald Accent */
  }

  .form-header {
    padding: 2.5rem 2.5rem 1rem 2.5rem;
    border-bottom: 1px solid rgba(45, 212, 191, 0.1);
  }

  .form-header h2 {
    font-family: 'Raleway', sans-serif;
    color: #ffffff;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 1.5rem;
    margin: 0;
  }

  .form-header p {
    color: #2dd4bf;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 5px;
  }

  .form-body-custom {
    padding: 2.5rem;
  }

  .form-label-custom {
    color: rgba(255, 255, 255, 0.7);
    font-weight: 500;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-label-custom i {
    color: #2dd4bf;
  }

  .form-control-custom {
    background: rgba(11, 48, 55, 0.5);
    border: 1px solid rgba(45, 212, 191, 0.2);
    border-radius: 4px;
    padding: 0.8rem 1rem;
    color: white;
    font-size: 1rem;
    transition: all 0.3s ease;
    width: 100%;
  }

  .form-control-custom:focus {
    background: rgba(11, 48, 55, 0.8);
    border-color: #2dd4bf;
    box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.1);
    color: white;
    outline: none;
  }

  .form-control-custom option {
    background: #0b3037;
    color: white;
  }

  .input-group-custom {
    margin-bottom: 1.8rem;
  }

  .btn-submit-custom {
    background: #2dd4bf;
    border: none;
    border-radius: 4px;
    padding: 1rem;
    color: #0b3037;
    font-weight: 700;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    width: 100%;
    margin-top: 1rem;
  }

  .btn-submit-custom:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(45, 212, 191, 0.2);
  }

  /* Responsive Adjustments */
  @media (max-width: 768px) {
    .form-body-custom {
      padding: 1.5rem;
    }
  }
</style>

<div class="form-container">
  <div class="boat-form-card">
    <div class="form-header">
      <h2>Add Vessel</h2>
      <p>Registry Management</p>
    </div>

    <div class="form-body-custom">
      <form action="/myapp/boat_owner_add_boat" method="post" enctype="multipart/form-data">

        <div class="input-group-custom">
          <label for="regno" class="form-label-custom">
            <i class="fas fa-fingerprint"></i>
            Registration Number
          </label>
          <input
            type="text"
            id="regno"
            name="regno"
            class="form-control-custom"
            placeholder="Official ID / Reg No."
            required
          >
        </div>

        <div class="input-group-custom">
          <label for="capacity" class="form-label-custom">
            <i class="fas fa-weight-hanging"></i>
            Vessel Capacity
          </label>
          <input
            type="number"
            id="capacity"
            name="capacity"
            class="form-control-custom"
            placeholder="Max Persons/Load"
            min="1"
            required
          >
        </div>

        <div class="input-group-custom">
          <label for="type" class="form-label-custom">
            <i class="fas fa-layer-group"></i>
            Vessel Classification
          </label>
          <select
            id="type"
            name="type"
            class="form-control-custom"
            required
          >
            <option value="" disabled selected>Select Type</option>
            <option value="Fishing Trawler">Fishing Trawler</option>
            <option value="Cargo Vessel">Cargo Vessel</option>
            <option value="Passenger Boat">Passenger Boat</option>
            <option value="Speed Boat">Speed Boat</option>
            <option value="Sailing Boat">Sailing Boat</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <button type="submit" class="btn-submit-custom">
          <i class="fas fa-save me-2"></i> Register Vessel
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
