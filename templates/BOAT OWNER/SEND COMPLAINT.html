{% extends 'BOAT OWNER/owner_home.html' %}
{% block body %}
<style>
  /* Formal Deep Teal Complaint Styling */
  .complaint-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1rem;
  }

  .complaint-card {
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(15px);
    border-radius: 8px;
    border: 1px solid rgba(45, 212, 191, 0.3);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    max-width: 650px;
    width: 100%;
  }

  .card-header-complaint {
    background: rgba(45, 212, 191, 0.1);
    padding: 2.5rem;
    text-align: center;
    border-bottom: 1px solid rgba(45, 212, 191, 0.2);
  }

  .card-header-complaint h2 {
    font-family: 'Raleway', sans-serif;
    color: white;
    font-weight: 800;
    font-size: 1.6rem;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .card-header-complaint i {
    font-size: 2.5rem;
    color: #2dd4bf;
    margin-bottom: 1rem;
  }

  .form-body-complaint {
    padding: 2.5rem;
  }

  .form-label-complaint {
    color: #2dd4bf;
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .textarea-complaint {
    background: rgba(11, 48, 55, 0.5);
    border: 1px solid rgba(45, 212, 191, 0.3);
    border-radius: 4px;
    padding: 1.25rem;
    color: white !important;
    font-size: 0.95rem;
    width: 100%;
    min-height: 180px;
    transition: 0.3s;
    line-height: 1.6;
  }

  .textarea-complaint:focus {
    background: rgba(11, 48, 55, 0.8);
    border-color: #2dd4bf;
    box-shadow: 0 0 10px rgba(45, 212, 191, 0.2);
    outline: none;
  }

  .textarea-complaint::placeholder {
    color: rgba(255, 255, 255, 0.3);
  }

  .char-counter {
    text-align: right;
    color: rgba(45, 212, 191, 0.5);
    font-size: 0.7rem;
    margin-top: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .priority-badges {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .badge-custom {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .badge-urgent {
    background: rgba(45, 212, 191, 0.1);
    color: #2dd4bf;
    border: 1px solid rgba(45, 212, 191, 0.3);
  }

  .btn-submit-complaint {
    background: transparent;
    border: 1px solid #2dd4bf;
    color: #2dd4bf;
    border-radius: 4px;
    padding: 1rem 2rem;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: 0.3s;
    width: 100%;
    margin-top: 1rem;
  }

  .btn-submit-complaint:hover {
    background: #2dd4bf;
    color: #0b3037;
    box-shadow: 0 10px 20px rgba(45, 212, 191, 0.2);
  }

  .divider {
    height: 1px;
    background: rgba(45, 212, 191, 0.1);
    margin: 2rem 0;
  }

  @media (max-width: 768px) {
    .form-body-complaint { padding: 1.5rem; }
    .card-header-complaint h2 { font-size: 1.3rem; }
  }
</style>

<div class="complaint-container">
  <div class="complaint-card">
    <div class="card-header-complaint">
      <i class="fa-solid fa-file-shield"></i>
      <h2>Formal Incident Report</h2>
    </div>

    <div class="form-body-complaint">
      <form method="post" action="/myapp/boat_owner_send_complaint_post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="priority-badges">
          <span class="badge-custom badge-urgent">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Standard Processing: 48H
          </span>
        </div>

        <div>
          <label for="complaint" class="form-label-complaint">
            <i class="fa-solid fa-pen-nib"></i>
            Detailed Statement
          </label>
          <textarea
            id="complaint"
            name="COMPLAINT"
            class="textarea-complaint"
            placeholder="Provide a technical description of the issue or incident..."
            required
            maxlength="1000"
            oninput="updateCharCount(this)"
          ></textarea>
          <div class="char-counter">
            <span id="charCount">0</span> / 1000 Units
          </div>
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn-submit-complaint">
          <i class="fa-solid fa-paper-plane me-2"></i> File Report
        </button>
      </form>
    </div>
  </div>
</div>

<script>
  function updateCharCount(textarea) {
    const count = textarea.value.length;
    const charCountEl = document.getElementById('charCount');
    charCountEl.textContent = count;

    if (count > 900) {
      charCountEl.style.color = '#ef4444';
    } else {
      charCountEl.style.color = '#2dd4bf';
    }
  }
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}
